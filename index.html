<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Crypto Chat</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #auth-screen {
            background: #161b22;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #30363d;
            width: 100%;
            max-width: 350px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .input-group {
            position: relative;
            margin: 10px 0;
        }

        input {
            width: 100%;
            padding: 12px;
            background: #010409;
            border: 1px solid #30363d;
            color: white;
            border-radius: 6px;
            outline: none;
        }

        /* Стиль для глазика */
        .eye-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #8b949e;
            user-select: none;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #238636;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 10px;
        }

        #chat-container {
            display: none;
            width: 100%;
            max-width: 600px;
            height: 90vh;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            flex-direction: column;
            overflow: hidden;
        }

        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px; border-radius: 10px; max-width: 80%; }
        .mine { align-self: flex-end; background: #238636; }
        .others { align-self: flex-start; background: #30363d; }

        #input-area { padding: 15px; background: #0d1117; display: flex; gap: 10px; border-top: 1px solid #30363d; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <h2 style="text-align: center; margin-bottom: 20px;">Вход</h2>
        <input type="text" id="userName" placeholder="Имя">
        
        <!-- Поле для ключа активации с глазиком -->
        <div class="input-group">
            <input type="password" id="activationKey" placeholder="Ключ активации">
            <span class="eye-btn" onclick="toggleEye('activationKey', this)">👁️</span>
        </div>

        <button class="btn" onclick="login()">ВОЙТИ</button>
    </div>

    <div id="chat-container">
        <div id="messages"></div>
        <div id="input-area">
            <input type="text" id="msgInput" placeholder="Сообщение...">
            <button class="btn" style="width: auto; margin: 0;" onclick="sendMessage()">ОТП</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBmT6Vt3dFhJL4YgXLZnzdxoN9kLQDybMI",
            authDomain: "support-22563.firebaseapp.com",
            projectId: "support-22563",
            storageBucket: "support-22563.firebasestorage.app",
            messagingSenderId: "247573206957",
            appId: "1:247573206957:web:eb69c95c765c0eca5b7324"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Функция для глазика
        function toggleEye(inputId, el) {
            const input = document.getElementById(inputId);
            if (input.type === "password") {
                input.type = "text";
                el.textContent = "🔒";
            } else {
                input.type = "password";
                el.textContent = "👁️";
            }
        }

async function login() {
    const name = document.getElementById('userName').value.trim();
    const key = document.getElementById('activationKey').value.trim();

    if (!name || !key) return alert("Заполни поля!");

    try {
        // --- ШАГ 1: ПРОВЕРКА БАНА ---
        const banDoc = await db.collection("banned").doc(name).get();
        if (banDoc.exists) {
            alert("Твой ник заблокирован администратором!");
            return; // Выходим и не пускаем в чат
        }

        // --- ШАГ 2: ПРОВЕРКА КЛЮЧА (твой старый код) ---
        const configDoc = await db.collection("settings").doc("config").get();
        const serverKey = configDoc.data().activation_key;

        if (key === serverKey) {
            localStorage.setItem('chat_user_name', name);
            currentUser = name;
            showChat();
        } else {
            alert("Неверный ключ!");
        }
    } catch (e) {
        console.error(e);
        alert("Ошибка связи с базой.");
    }
}

        function showChat() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('chat-container').style.display = 'flex';
            loadMessages();
        }

        async function sendMessage() {
            const input = document.getElementById('msgInput');
            const name = localStorage.getItem('chat_user');
            if (!input.value) return;

            await db.collection("messages").add({
                user: name,
                text: input.value,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            input.value = "";
        }

        function loadMessages() {
            db.collection("messages").orderBy("timestamp", "asc").onSnapshot(snap => {
                const messagesDiv = document.getElementById('messages');
                messagesDiv.innerHTML = "";
                snap.forEach(doc => {
                    const m = doc.data();
                    const isMine = m.user === localStorage.getItem('chat_user');
                    messagesDiv.innerHTML += `<div class="msg ${isMine ? 'mine' : 'others'}"><b>${m.user}:</b> ${m.text}</div>`;
                });
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            });
        }
    </script>
</body>
</html>
